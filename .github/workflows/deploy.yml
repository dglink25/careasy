name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/careasy

            git fetch origin main
            git reset --hard origin/main

            # ── 3. Dépendances ─────────────────────────────────────────
            rm -rf vendor/
            composer install --no-dev --optimize-autoloader --quiet

            # ── 4. Migrations ──────────────────────────────────────────
            php artisan migrate --force

            # ── 5. Storage ─────────────────────────────────────────────
            mkdir -p storage/app/public/messages storage/app/public/uploads storage/logs
            chmod -R 775 storage bootstrap/cache 2>/dev/null || true
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            rm -f public/storage && php artisan storage:link

            # ── 6. Cache ───────────────────────────────────────────────
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── 7. PHP-FPM — limites upload (100 Mo) ──────────────────
            PHP_V=$(php -r "echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;")
            PHP_INI="/etc/php/${PHP_V}/fpm/conf.d/99-careasy.ini"
            if [ ! -f "$PHP_INI" ] || ! grep -q "upload_max_filesize = 100M" "$PHP_INI" 2>/dev/null; then
              printf '%s\n' \
                'upload_max_filesize = 100M' \
                'post_max_size       = 105M' \
                'max_execution_time  = 300' \
                'max_input_time      = 300' \
                'memory_limit        = 256M' \
                | tee "$PHP_INI" > /dev/null 2>&1 \
              && echo "PHP-FPM limits set to 100M" \
              || echo "WARN: PHP-FPM config skipped (permission denied — run sudoers setup on VPS)"
            fi

            # ── 8. Nginx — client_max_body_size ───────────────────────
            NGINX_CONF="/etc/nginx/sites-available/careasy"
            if [ -f "$NGINX_CONF" ]; then
              if ! grep -q "client_max_body_size" "$NGINX_CONF"; then
                sed -i '/server {/a\    client_max_body_size 105M;' "$NGINX_CONF" 2>/dev/null \
                && echo "client_max_body_size 105M ajouté dans Nginx" \
                || echo "WARN: Nginx config skipped (permission denied — run sudoers setup on VPS)"
              fi
              nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || true
            fi

            # ── 9. Queue + PHP-FPM ─────────────────────────────────────
            php artisan queue:restart
            systemctl reload php${PHP_V}-fpm 2>/dev/null || systemctl reload php-fpm 2>/dev/null || pkill -USR2 php-fpm 2>/dev/null || true

            echo "Deploiement reussi"
