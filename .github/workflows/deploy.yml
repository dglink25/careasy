name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true  # ← CRITIQUE : arrête au premier échec
          script: |
            set -e  # ← arrête le script si une commande échoue

            cd /var/www/careasy

            # Force la mise à jour sans se bloquer sur les fichiers locaux
            git fetch origin main
            git reset --hard origin/main

            # Dépendances
            composer install --no-dev --optimize-autoloader

            # Migrations
            php artisan migrate --force

            # Vider les caches AVANT de les regénérer
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan storage:link

            # Regénérer les caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Redémarrer les workers si tu as des queues
            # php artisan queue:restart

            echo " Déploiement réussi"