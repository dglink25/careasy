name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/careasy

            # ── 1. Code ────────────────────────────────────────────────
            git fetch origin main
            git reset --hard origin/main

            # ── 2. .env — NE PAS TOUCHER ──────────────────────────────
            # Le .env est posé manuellement sur le serveur une seule fois.
            # git reset --hard ne supprime pas les fichiers dans .gitignore.
            if [ ! -f .env ] || [ "$(wc -l < .env)" -lt 10 ]; then
              echo "❌ .env absent ou vide sur le serveur."
              echo "   Depuis ton poste local, exécute UNE SEULE FOIS :"
              echo "   ssh VPS_USERNAME@VPS_HOST 'cat > /var/www/careasy/.env' < .env.production"
              exit 1
            fi
            echo "✅ .env OK ($(wc -l < .env) lignes)"

            # ── 3. Dépendances ─────────────────────────────────────────
            composer install --no-dev --optimize-autoloader --quiet

            # ── 4. Migrations ──────────────────────────────────────────
            php artisan migrate --force

            # ── 5. Storage ─────────────────────────────────────────────
            mkdir -p storage/app/public/messages storage/app/public/uploads storage/logs
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            rm -f public/storage && php artisan storage:link

            # ── 6. Cache ───────────────────────────────────────────────
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── 7. Queue + PHP-FPM ─────────────────────────────────────
            php artisan queue:restart
            sudo systemctl reload php8.2-fpm 2>/dev/null || \
            sudo systemctl reload php8.1-fpm 2>/dev/null || \
            sudo systemctl reload php-fpm    2>/dev/null || \
            pkill -USR2 php-fpm 2>/dev/null || true

            echo "✅ Déploiement réussi"
