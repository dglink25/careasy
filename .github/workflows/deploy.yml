name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/careasy

            # ── 1. Code ────────────────────────────────────────────────
            git fetch origin main
            git reset --hard origin/main

            # ── 2. .env ────────────────────────────────────────────────
            # Le .env de production est déposé manuellement sur le serveur
            # une seule fois (voir scripts/install-env-production.sh).
            # Le workflow ne le touche JAMAIS — git reset --hard ne supprime
            # pas les fichiers ignorés par .gitignore.
            if [ ! -f .env ]; then
              echo "❌ .env absent du serveur."
              echo "   Exécute une fois : scp .env.production user@serveur:/var/www/careasy/.env"
              exit 1
            fi
            DB_CONN=$(grep "^DB_CONNECTION=" .env | cut -d= -f2 | tr -d ' \r')
            if [ -z "$DB_CONN" ]; then
              echo "❌ DB_CONNECTION vide dans .env"
              exit 1
            fi
            echo "✅ .env OK (DB=$DB_CONN)"

            # ── 3. Dépendances PHP ─────────────────────────────────────
            composer install --no-dev --optimize-autoloader --quiet

            # ── 4. Migrations ──────────────────────────────────────────
            php artisan migrate --force

            # ── 5. Storage + permissions ───────────────────────────────
            mkdir -p storage/app/public/messages
            mkdir -p storage/app/public/uploads
            mkdir -p storage/logs
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            rm -f public/storage
            php artisan storage:link
            echo "✅ Symlink : $(readlink public/storage)"

            # ── 6. Cache ───────────────────────────────────────────────
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── 7. Queue + PHP-FPM ─────────────────────────────────────
            php artisan queue:restart
            sudo systemctl reload php8.2-fpm 2>/dev/null || \
            sudo systemctl reload php8.1-fpm 2>/dev/null || \
            sudo systemctl reload php-fpm    2>/dev/null || \
            pkill -USR2 php-fpm 2>/dev/null || true

            echo "✅ Déploiement réussi"
