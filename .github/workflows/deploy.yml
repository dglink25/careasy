name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/careasy

            # ── 1. Code ────────────────────────────────────────────────
            git fetch origin main
            git reset --hard origin/main

            # ── 2. .env — supprimer et recréer depuis .env.example ─────
            rm -f .env
            cp .env.example .env
            echo "✅ .env recréé depuis .env.example ($(wc -l < .env) lignes)"

            # Vérification
            DB_CONN=$(grep "^DB_CONNECTION=" .env | cut -d= -f2 | tr -d ' \r')
            APP_URL_VAL=$(grep "^APP_URL=" .env | cut -d= -f2 | tr -d ' \r')
            echo "   DB=$DB_CONN | URL=$APP_URL_VAL"
            if [ -z "$DB_CONN" ]; then
              echo "❌ DB_CONNECTION vide dans .env.example"
              exit 1
            fi

            # ── 3. Dépendances ─────────────────────────────────────────
            # Nettoyer vendor/ pour éviter les erreurs package:discover
            rm -rf vendor/
            composer install --no-dev --optimize-autoloader --quiet

            # ── 4. Migrations ──────────────────────────────────────────
            php artisan migrate --force

            # ── 5. Storage ─────────────────────────────────────────────
            mkdir -p storage/app/public/messages storage/app/public/uploads storage/logs
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            rm -f public/storage && php artisan storage:link

            # ── 6. Cache ───────────────────────────────────────────────
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── 7. Queue + PHP-FPM ─────────────────────────────────────
            php artisan queue:restart
            sudo systemctl reload php8.2-fpm 2>/dev/null || \
            sudo systemctl reload php8.1-fpm 2>/dev/null || \
            sudo systemctl reload php-fpm    2>/dev/null || \
            pkill -USR2 php-fpm 2>/dev/null || true

            echo "✅ Déploiement réussi — $APP_URL_VAL"
