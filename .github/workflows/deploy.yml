name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/careasy

            git fetch origin main
            git reset --hard origin/main

            rm -f .env
            cp .env.example .env
            echo "✅ .env recréé ($(wc -l < .env) lignes)"

            # ── Dépendances — verbose pour voir l'erreur exacte ────────
            rm -rf vendor/
            composer install --no-dev --optimize-autoloader 2>&1
            COMPOSER_EXIT=$?
            if [ $COMPOSER_EXIT -ne 0 ]; then
              echo "❌ composer install a échoué (code $COMPOSER_EXIT)"
              echo "--- Vérification PHP et extensions ---"
              php --version
              php -m | grep -i "pgsql\|pdo"
              echo "--- Dernières lignes du log Laravel ---"
              tail -20 storage/logs/laravel.log 2>/dev/null || echo "Pas de log Laravel"
              exit 1
            fi

            # ── 4. Migrations ──────────────────────────────────────────
            php artisan migrate --force

            # ── 5. Storage ─────────────────────────────────────────────
            mkdir -p storage/app/public/messages storage/app/public/uploads storage/logs
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            rm -f public/storage && php artisan storage:link

            # ── 6. Cache ───────────────────────────────────────────────
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── 7. Queue + PHP-FPM ─────────────────────────────────────
            php artisan queue:restart
            sudo systemctl reload php8.2-fpm 2>/dev/null || \
            sudo systemctl reload php8.1-fpm 2>/dev/null || \
            sudo systemctl reload php-fpm    2>/dev/null || \
            pkill -USR2 php-fpm 2>/dev/null || true

            echo "✅ Déploiement réussi — $APP_URL_VAL"
